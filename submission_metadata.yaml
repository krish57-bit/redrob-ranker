ai_usage_summary: |
  Used Claude (Cowork) extensively: architecture discussion, code drafting,
  code review, and reproduction testing across the pipeline. The team
  directed the approach and owns the design decisions, weights, and trap
  defenses. Reproduction was verified by cloning the public repo and
  regenerating submission.csv byte-identically on the full 100K pool
  (Linux, 2-core CPU, no network). No hosted LLM is called anywhere in the
  ranking step; the ranker is fully offline and deterministic.

methodology_summary: |
  Interpretable hybrid ranker, no LLM at ranking time. Seven weighted
  components: career-history evidence mining (retrieval/ranking/NLP-LLM/
  production keyword families, recency-decayed) 0.32; current-title
  relevance 0.18 (gates keyword stuffers — non-technical titles are floored);
  trust-weighted skills 0.16 (skills count only when corroborated by
  duration, endorsements, or assessment scores); TF-IDF+LSA semantic
  similarity to the JD 0.12; experience-band fit 0.10; location 0.08;
  notice-period logistics 0.04. Multiplicative penalties encode the JD's
  explicit disqualifiers (consulting-only careers, research-without-
  production, CV/speech-only, job-hoppers). A behavioral multiplier
  down-weights unavailable candidates (inactivity, low recruiter response,
  not open to work, low interview completion). Honeypots are caught by four
  internal-consistency checks (impossible skill durations, expert-with-zero-
  use, date mismatches, career overflow): 0 honeypots in our top 100.
  Runtime ~2.5 min on 2-core CPU, <3 GB RAM, fully offline.

